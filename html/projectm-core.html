<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel='preconnect' href='https://wasm.noahcohn.com'>
<link rel='preconnect' href='https://js.1ink.us'>
<link rel='preconnect' href='https://glsl.1ink.us'>
<title>Project M - Advanced Music Visualization</title>
<link rel="stylesheet" href="./projectm-core.css">
<style>
body { margin: 0; padding: 0; background-color: black; overflow: hidden; }
</style>
</head>
<body>

<!-- Loading Splash Screen -->
<img id="splash1" src="./image/shroud.jpg" style="position:absolute;height:100vh;width:100vw;z-index:3590;display:block;"></img>
<img id="splash2" src="./image/spinner.gif" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);height:20vh;width:20vh;z-index:3591;display:block;"></img>

<!-- Main Container -->
<div id="wrap">
  <div id="contain1" style="position:absolute;">
    <!-- Circular bezel overlay -->
    <canvas id="circle" style="position:absolute;z-index:3200;pointer-events:none;"></canvas>

    <!-- Main visualization canvases -->
    <canvas class="emscripten" id="mcanvas" style="pointer-events:auto;display:block;position:absolute;z-index:3001;background-color:rgba(0,0,0,0.0);top:0;left:0;image-rendering:auto;transform:scaleY(1.0);"></canvas>
    <canvas class="emscripten" id="scanvas" style="pointer-events:auto;display:block;position:absolute;z-index:3000;background-color:rgba(0,0,0,1.0);top:0;left:0;image-rendering:auto;transform:scaleY(-1.0);"></canvas>
  </div>
</div>

<!-- UI Overlay -->
<div id="ui-overlay">
  <!-- Logo -->
  <img src="./image/scale4x.png" id="logo-right" style="position:absolute;top:2vh;right:2vh;height:15vh;z-index:3300;display:block;"/>
  <img src="./image/1inkusa.png" id="logo-left" style="position:absolute;top:2vh;left:2vh;height:15vh;z-index:3300;display:block;"/>

  <!-- Bezel frame overlay -->
  <img src="./unglass.png" id="bezel-frame" style="position:absolute;z-index:555;pointer-events:none;display:block;"/>

  <!-- Control Panel Container (bottom left) -->
  <div id="control-panel" class="control-panel-container">
    <!-- Show/Hide Controls Button with image background -->
    <button id="showControlsBtn" class="show-controls-btn" style="background-image: url('./panel-bg.jpg');">
    </button>

    <!-- Control Buttons positioned to match image -->
    <div id="controls-container" class="controls-container">
      <!-- Hide Controls (top-left) -->
      <button id="hideControlsBtn" class="control-btn hide-controls-btn" style="background-color:rgba(0,0,0,0.6);">
        <span class="btn-label">Hide</span>
      </button>

      <!-- Lock Preset (top-center) -->
      <button id="lockPresetBtn" class="control-btn lock-preset-btn" style="background-color:rgba(0,0,0,0.6);">
        <span class="btn-label">Lock</span>
      </button>

      <!-- Flac Player (top-right) -->
      <button id="flacPlayerBtn" class="control-btn flac-player-btn" style="background-color:#8b5cf6;">
        <span class="btn-label">Open FLAC Player</span>
      </button>

      <!-- Start / Change Song (left) -->
      <button id="musicBtn" class="control-btn music-btn" style="background-color:rgba(0,0,0,0.6);">
        <span class="btn-label">Start</span>
      </button>

      <!-- Random Preset (right) -->
      <button id="randomPresetBtn" class="control-btn random-preset-btn" style="background-color:rgba(0,0,0,0.6);">
        <span class="btn-label">Random</span>
      </button>

      <!-- Full Window (bottom-left) -->
      <button id="toggleBezelBtn" class="control-btn full-window-btn" style="background-color:rgba(0,0,0,0.6);">
        <span class="btn-label">Window</span>
      </button>

      <!-- Fullscreen (bottom-center) -->
      <button class="control-btn fullscreen-btn" style="background-color:rgba(0,0,0,0.6);">
        <span class="btn-label">Fullscreen</span>
      </button>

      <!-- Random Custom (bottom-right) -->
      <button id="customMilkBtn" class="control-btn custom-milk-btn" style="background-color:rgba(0,0,0,0.6);">
        <span class="btn-label">Custom</span>
      </button>

      <!-- Random Preset API (hidden, for functionality) -->
      <button id="apiRandomPresetBtn" class="control-btn api-preset-btn" style="display:none;">
        <span class="btn-label">API Random</span>
      </button>
    </div>
  </div>

  <div id="preset-name">Preset: --</div>
  <div id="flac-status" style="position:fixed;bottom:2vh;left:530px;z-index:3299;font-family:'Lucida Console','Courier New',monospace;font-size:14px;color:#22c55e;pointer-events:none;white-space:nowrap;text-shadow:1px 1px 2px rgba(0,0,0,0.85);"></div>
</div>

<!-- Hidden data containers -->
<div id="dataContainer" style="display:none;">
  <div id="birdsongPath">https://www.noahcohn.com/birdsongs/26HouseFinchSong.mp3</div>
  <div id="milkPath">https://glsl.1ink.us/milk/flexi.milk</div>
  <div id="textureDir">textures/</div>
  <div id="songDir">songs/</div>
  <div id="presetDir">default</div>
  <div id="srsiz">1000</div>
  <div id="wid">1280</div>
  <div id="hig">720</div>
  <div id="tim">8500</div>
  <div id="vsiz">0</div>
  <div id="flacPlayerUrl">https://flac.1ink.us</div>
</div>

<!-- Audio element -->
<audio crossorigin id="track" preload="none" style="pointer-events:none;"></audio>

</body>
<script type="module">

// Initialization flags
let isBezelMode = true;
let Module;

// Preset name display helper
window.updatePresetDisplay = function(name) {
    if (!name) return;
    const basename = name.split('/').pop();
    const el = document.querySelector('#preset-name');
    if (el) {
        el.textContent = 'Preset: ' + basename;
        window.currentPresetName = basename;
    }
};

// ====== CANVAS SIZE MANAGEMENT ======
function updateLayout() {
    const mcanvas = document.querySelector('#mcanvas');
    const scanvas = document.querySelector('#scanvas');
    const wrap = document.querySelector('#wrap');
    const contain1 = document.querySelector('#contain1');
    const bezelFrame = document.querySelector('#bezel-frame');

    if (isBezelMode) {
        // === BEZEL MODE (centered square) ===
        const sz = window.innerHeight;

        if (wrap) {
            wrap.style.width = ''; wrap.style.height = ''; wrap.style.position = '';
            wrap.style.top = ''; wrap.style.left = '';
        }
        if (contain1) {
            contain1.style.width = sz + 'px';
            contain1.style.height = sz + 'px';
            contain1.style.left = 'calc(50vw - ' + (sz / 2) + 'px)';
            contain1.style.top = 'calc(50vh - ' + (sz / 2) + 'px)';
            contain1.style.position = 'absolute';
        }

        mcanvas.style.left = '0';
        mcanvas.style.top = '0';
        scanvas.style.left = '0';
        scanvas.style.top = '0';

        document.querySelector('#circle').style.display = 'block';
        if (bezelFrame) bezelFrame.style.display = 'block';
    } else {
        // === FULLSCREEN MODE ===
        const vw = window.innerWidth;
        const vh = window.innerHeight;

        if (wrap) {
            wrap.style.width = '100vw'; wrap.style.height = '100vh';
            wrap.style.position = 'fixed'; wrap.style.top = '0'; wrap.style.left = '0';
        }
        if (contain1) {
            contain1.style.width = '100vw';
            contain1.style.height = '100vh';
            contain1.style.left = '0';
            contain1.style.top = '0';
            contain1.style.position = 'fixed';
        }

        mcanvas.style.left = '0';
        mcanvas.style.top = '0';
        scanvas.style.left = '0';
        scanvas.style.top = '0';

        document.querySelector('#circle').style.display = 'none';
        if (bezelFrame) bezelFrame.style.display = 'none';
    }
}

// ResizeObserver handles internal canvas resolution and Module window size.
// It fires once immediately on observation, guaranteeing the initial size
// is synced with the final CSS layout before the Emscripten module loads.
const resizeObserver = new ResizeObserver((entries) => {
    for (const entry of entries) {
        const dpr = window.devicePixelRatio || 1;
        const cssWidth = entry.contentRect.width;
        const cssHeight = entry.contentRect.height;
        const w = Math.max(1, Math.round(cssWidth * dpr));
        const h = Math.max(1, Math.round(cssHeight * dpr));

        const mcanvas = document.querySelector('#mcanvas');
        const scanvas = document.querySelector('#scanvas');
        if (!mcanvas || !scanvas) continue;

        mcanvas.width = w;
        mcanvas.height = h;
        scanvas.width = w;
        scanvas.height = h;

        mcanvas.style.width = cssWidth + 'px';
        mcanvas.style.height = cssHeight + 'px';
        scanvas.style.width = cssWidth + 'px';
        scanvas.style.height = cssHeight + 'px';

        if (typeof Module !== 'undefined' && Module._set_window_size) {
            Module._set_window_size(w, h);
        }
        if (typeof Module !== 'undefined' && Module._set_aspect_correction) {
            Module._set_aspect_correction(isBezelMode);
        }
    }
});

const contain1El = document.querySelector('#contain1');
if (contain1El) {
    resizeObserver.observe(contain1El);
}

// ====== API PRESET HELPERS ======
function getPresetDir() {
    const el = document.getElementById('presetDir');
    const val = el ? el.innerHTML.trim() : 'default';
    return val === 'default' ? 'any' : val;
}

async function fetchApiPreset(apiBase) {
    const dir = getPresetDir();
    const res = await fetch(`${apiBase}/api/presets/random?dir=${encodeURIComponent(dir)}`);
    if (!res.ok) throw new Error('API error: ' + res.status);
    const data = await res.json();
    if (!data.url || !data.filename || !data.dir) {
        throw new Error('Invalid API response: missing url, filename, or dir');
    }
    const milkRes = await fetch(data.url);
    if (!milkRes.ok) throw new Error('Failed to fetch milk: ' + milkRes.status);
    const buffer = await milkRes.arrayBuffer();
    const bytes = new Uint8ClampedArray(buffer);
    const safeName = data.filename.replace(/[^a-zA-Z0-9._-]/g, '_');
    const vfsPath = `/presets/api_${data.dir}_${safeName}`;
    if (!Module.FS) throw new Error('Module.FS not available');
    Module.FS.writeFile(vfsPath, bytes);
    return { vfsPath, filename: data.filename, dir: data.dir };
}

async function loadStartupApiPresets(count) {
    const apiBase = localStorage.getItem('apiBase') || 'https://storage.noahcohn.com';
    const results = [];
    for (let i = 0; i < count; i++) {
        try {
            const result = await fetchApiPreset(apiBase);
            results.push(result);
            console.log('Startup API preset', i, 'loaded:', result.filename);
            updatePresetDisplay(result.filename);
        } catch (e) {
            console.error('Failed to load startup API preset', i, e);
        }
    }
    return results;
}

// ====== SHOW/HIDE CONTROLS ======
let controlsVisible = true;
const showControlsBtn = document.getElementById('showControlsBtn');
const controlsContainer = document.getElementById('controls-container');
const hideControlsBtn = document.getElementById('hideControlsBtn');

function toggleControls() {
    controlsVisible = !controlsVisible;
    if (!controlsVisible) {
        controlsContainer.classList.add('hidden');
    } else {
        controlsContainer.classList.remove('hidden');
    }
}

showControlsBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    toggleControls();
});

if (hideControlsBtn) {
    hideControlsBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        toggleControls();
    });
}

// ====== UI CONTROLS ======
async function loadRandomApiPreset() {
    if (typeof Module === 'undefined' || !Module._load_preset_file) {
        console.error('Module not ready');
        return;
    }
    const apiBase = localStorage.getItem('apiBase') || 'https://storage.noahcohn.com';
    try {
        const result = await fetchApiPreset(apiBase);
        Module.ccall('load_preset_file', null, ['string'], [result.vfsPath]);
        updatePresetDisplay(result.filename);
        console.log('Loaded API preset:', result.filename, 'from', result.dir);
    } catch (e) {
        console.error('Failed to load API preset:', e);
    }
}

document.getElementById("randomPresetBtn").addEventListener('click', function() {
    loadRandomApiPreset();
});

document.getElementById("apiRandomPresetBtn").addEventListener('click', function() {
    loadRandomApiPreset();
});

let isPresetLocked = false;
document.getElementById("lockPresetBtn").addEventListener('click', function() {
    isPresetLocked = !isPresetLocked;
    const btn = document.getElementById("lockPresetBtn");
    const label = btn.querySelector('.btn-label');
    if (isPresetLocked) {
        btn.style.backgroundColor = 'red';
        if (label) label.textContent = 'Unlock Preset';
    } else {
        btn.style.backgroundColor = 'green';
        if (label) label.textContent = 'Lock Preset';
    }
    if (typeof Module !== 'undefined' && Module._set_preset_locked) {
        Module._set_preset_locked(isPresetLocked ? 1 : 0);
    } else if (typeof Module !== 'undefined' && Module.ccall) {
        Module.ccall('set_preset_locked', null, ['number'], [isPresetLocked ? 1 : 0]);
    }
    console.log('Preset lock:', isPresetLocked);
});

// ====== FLAC PLAYER INTEGRATION ======
let audioChannel = null;
let playerPopup = null;
let flacStatusTimeoutId = null;

function feedPCMToModule(buf) {
    if (typeof Module === 'undefined' || !Module._projectm_pcm_add_float_wrapper) {
        console.warn('feedPCMToModule: Module not ready, dropping PCM frame');
        return;
    }
    const ptr = Module._malloc(buf.length * 4);
    if (!ptr) return;
    try {
        Module.HEAPF32.set(buf, ptr >> 2);
        // pm_handle arg is ignored by the wrapper (uses app_data internally); pass 0
        Module._projectm_pcm_add_float_wrapper(0, ptr, buf.length, 1);
    } finally {
        Module._free(ptr);
    }
}

function updateFlacStatus(connected) {
    const indicator = document.getElementById('flac-status');
    const btn = document.getElementById('flacPlayerBtn');
    const label = btn ? btn.querySelector('.btn-label') : null;
    if (indicator) {
        indicator.textContent = connected ? '● FLAC' : '';
    }
    if (btn) {
        btn.style.backgroundColor = connected ? '#22c55e' : '#8b5cf6';
    }
    if (label) {
        label.textContent = connected ? 'FLAC Live' : 'Open FLAC Player';
    }
}

function openFlacPlayer() {
    const urlEl = document.getElementById('flacPlayerUrl');
    const url = (urlEl ? urlEl.textContent.trim() : '') ||
                localStorage.getItem('flacPlayerUrl') ||
                'https://flac.1ink.us';
    playerPopup = window.open(url, 'flac-player',
        'width=420,height=700,resizable=yes,scrollbars=no');

    if (!playerPopup) {
        console.warn('openFlacPlayer: popup was blocked. Please allow popups for this site.');
    }

    if (!audioChannel) {
        audioChannel = new BroadcastChannel('projectm-audio');
        audioChannel.onmessage = (e) => {
            if (e.data?.type === 'pcm' && e.data.buffer) {
                feedPCMToModule(e.data.buffer);
                updateFlacStatus(true);
                clearTimeout(flacStatusTimeoutId);
                flacStatusTimeoutId = setTimeout(() => updateFlacStatus(false), 3000);
            }
        };
    }
}

document.getElementById('flacPlayerBtn').addEventListener('click', openFlacPlayer);

function syncModuleSize() {
    const contain1 = document.querySelector('#contain1');
    const mcanvas = document.querySelector('#mcanvas');
    const scanvas = document.querySelector('#scanvas');
    if (!contain1 || !mcanvas || !scanvas || typeof Module === 'undefined') return;
    const rect = contain1.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    const w = Math.max(1, Math.round(rect.width * dpr));
    const h = Math.max(1, Math.round(rect.height * dpr));
    mcanvas.width = w;
    mcanvas.height = h;
    scanvas.width = w;
    scanvas.height = h;
    mcanvas.style.width = rect.width + 'px';
    mcanvas.style.height = rect.height + 'px';
    scanvas.style.width = rect.width + 'px';
    scanvas.style.height = rect.height + 'px';
    if (Module._set_window_size) {
        Module._set_window_size(w, h);
    }
    if (Module._set_aspect_correction) {
        Module._set_aspect_correction(isBezelMode);
    }
}

document.getElementById("toggleBezelBtn").addEventListener('click', function() {
    isBezelMode = !isBezelMode;
    updateLayout();
    syncModuleSize();
});

// ====== WINDOW RESIZE HANDLER ======
// ResizeObserver subsumes viewport resize for the canvases themselves,
// but in bezel mode contain1 has a fixed pixel size derived from
// window.innerHeight, so we still need to recompute layout on resize.
window.addEventListener('resize', updateLayout);

// ====== MODULE INITIALIZATION ======
// Initialize layout immediately. ResizeObserver will fire once
// with the correct CSS-computed size and set internal resolution.
updateLayout();

// Hide splash screens after a delay
setTimeout(function(){
    document.querySelector('#splash2').style.display = 'none';
}, 5200);
setTimeout(function(){
    document.querySelector('#splash1').style.display = 'none';
}, 5500);

// Load Module
setTimeout(function(){
    let scr = document.createElement("script");
    scr.async = true;
    scr.charset = 'utf-8';
    scr.type = 'text/javascript';
    scr.defer = true;
    scr.src = "./pm/projectm-v.024-thread.1ijs";
    document.body.appendChild(scr);

    setTimeout(function(){
        createModule().then(async function(instance) {
            Module = instance;

            Module._init();
            updateLayout();
            syncModuleSize();
            const mcanvas = document.querySelector('#mcanvas');

            // Start the render loop *before* downloading presets so that
            // projectM's TimeKeeper (m_currentTime) is already being advanced
            // each frame by UpdateTimers().  If start_render is called *after*
            // load_preset_file, m_transitionStartTime is set to ~0 while the
            // render loop hasn't started yet; when it does start, m_currentTime
            // immediately jumps to wall-clock elapsed time, making the
            // transition appear instant (hard cut) whenever startup takes
            // longer than the soft-cut duration (~17 s on slow networks/devices).
            Module._start_render(mcanvas.width, mcanvas.height);

            const startupResults = await loadStartupApiPresets(5);
            if (startupResults.length > 0) {
                // The render loop is now running, so m_currentTime is current.
                // load_preset_file will start a smooth 17-second crossfade from
                // the idle preset to the first API preset.
                Module.ccall('load_preset_file', null, ['string'], [startupResults[0].vfsPath]);
                updatePresetDisplay(startupResults[0].filename);
                for (let i = 1; i < startupResults.length; i++) {
                    Module.ccall('add_preset_file', null, ['string'], [startupResults[i].vfsPath]);
                }
            } else {
                console.warn('No startup API presets loaded');
            }
        }).catch(function(err) {
            console.error('projectM module initialization failed:', err);
        });
    }, 1000);
}, 750);

// Start with default audio
setTimeout(function(){
    document.getElementById('musicBtn').click();
}, 3000);

</script>
</body>
</html>
