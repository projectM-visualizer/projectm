<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel='preconnect' href='https://wasm.noahcohn.com'>
<link rel='preconnect' href='https://js.1ink.us'>
<link rel='preconnect' href='https://glsl.1ink.us'>
<title>Project M - Advanced Music Visualization</title>
<link rel="stylesheet" href="./projectm-core.css">
<style>
body { margin: 0; padding: 0; background-color: black; overflow: hidden; }
</style>
</head>
<body>

<!-- Loading Splash Screen -->
<img id="splash1" src="./image/shroud.jpg" style="position:absolute;height:100vh;width:100vw;z-index:3590;display:block;"></img>
<img id="splash2" src="./image/spinner.gif" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);height:20vh;width:20vh;z-index:3591;display:block;"></img>

<!-- Main Container -->
<div id="wrap">
  <div id="contain1" style="position:absolute;">
    <!-- Circular bezel overlay -->
    <canvas id="circle" style="position:absolute;z-index:3200;pointer-events:none;"></canvas>

    <!-- Main visualization canvases -->
    <canvas class="emscripten" id="mcanvas" style="pointer-events:auto;display:block;position:absolute;z-index:3001;background-color:rgba(0,0,0,0.0);top:0;left:0;image-rendering:auto;transform:scaleY(1.0);"></canvas>
    <canvas class="emscripten" id="scanvas" style="pointer-events:auto;display:block;position:absolute;z-index:3000;background-color:rgba(0,0,0,1.0);top:0;left:0;image-rendering:auto;transform:scaleY(-1.0);"></canvas>
  </div>
</div>

<!-- UI Overlay -->
<div id="ui-overlay">
  <!-- Logo -->
  <img src="./image/scale4x.png" id="logo-right" style="position:absolute;top:2vh;right:2vh;height:15vh;z-index:3300;display:block;"/>
  <img src="./image/1inkusa.png" id="logo-left" style="position:absolute;top:2vh;left:2vh;height:15vh;z-index:3300;display:block;"/>

  <!-- Bezel frame overlay -->
  <img src="./unglass.png" id="bezel-frame" style="position:absolute;z-index:555;pointer-events:none;display:block;"/>

  <!-- Control Buttons -->
  <button id="musicBtn" class="control-btn" style="background-color:cyan;left:3%;bottom:15%;">
    <span class="btn-label">Start / Change Song</span>
  </button>

  <button id="randomPresetBtn" class="control-btn" style="background-color:orange;left:3%;bottom:25%;">
    <span class="btn-label">Random Preset</span>
  </button>

  <button id="toggleBezelBtn" class="control-btn" style="background-color:blue;left:3%;bottom:35%;">
    <span class="btn-label">Toggle Fullscreen</span>
  </button>

  <button id="customMilkBtn" class="control-btn" style="background-color:purple;left:3%;bottom:45%;">
    <span class="btn-label">Random Custom</span>
  </button>

  <button id="apiRandomPresetBtn" class="control-btn" style="background-color:teal;left:3%;bottom:55%;">
    <span class="btn-label">Random Preset (API)</span>
  </button>
</div>

<!-- Hidden data containers -->
<div id="dataContainer" style="display:none;">
  <div id="birdsongPath">https://www.noahcohn.com/birdsongs/26HouseFinchSong.mp3</div>
  <div id="milkPath">https://glsl.1ink.us/milk/flexi.milk</div>
  <div id="srsiz">1000</div>
  <div id="wid">1280</div>
  <div id="hig">720</div>
  <div id="tim">8500</div>
  <div id="vsiz">0</div>
</div>

<!-- Audio element -->
<audio crossorigin id="track" preload="none" style="pointer-events:none;"></audio>

</body>
<script type="module">

// Initialization flags
let isBezelMode = true;
let Module;

// ====== CANVAS SIZE MANAGEMENT ======
function updateLayout() {
    const mcanvas = document.querySelector('#mcanvas');
    const scanvas = document.querySelector('#scanvas');
    const wrap = document.querySelector('#wrap');
    const contain1 = document.querySelector('#contain1');
    const bezelFrame = document.querySelector('#bezel-frame');

    if (isBezelMode) {
        // === BEZEL MODE (centered square) ===
        const sz = window.innerHeight;

        if (wrap) {
            wrap.style.width = ''; wrap.style.height = ''; wrap.style.position = '';
            wrap.style.top = ''; wrap.style.left = '';
        }
        if (contain1) {
            contain1.style.width = sz + 'px';
            contain1.style.height = sz + 'px';
            contain1.style.left = 'calc(50vw - ' + (sz / 2) + 'px)';
            contain1.style.top = 'calc(50vh - ' + (sz / 2) + 'px)';
            contain1.style.position = 'absolute';
        }

        mcanvas.style.left = '0';
        mcanvas.style.top = '0';
        scanvas.style.left = '0';
        scanvas.style.top = '0';

        document.querySelector('#circle').style.display = 'block';
        if (bezelFrame) bezelFrame.style.display = 'block';
    } else {
        // === FULLSCREEN MODE ===
        const vw = window.innerWidth;
        const vh = window.innerHeight;

        if (wrap) {
            wrap.style.width = '100vw'; wrap.style.height = '100vh';
            wrap.style.position = 'fixed'; wrap.style.top = '0'; wrap.style.left = '0';
        }
        if (contain1) {
            contain1.style.width = '100vw';
            contain1.style.height = '100vh';
            contain1.style.left = '0';
            contain1.style.position = 'fixed';
        }

        mcanvas.style.left = '0';
        mcanvas.style.top = '0';
        scanvas.style.left = '0';
        scanvas.style.top = '0';

        document.querySelector('#circle').style.display = 'none';
        if (bezelFrame) bezelFrame.style.display = 'none';
    }
}

// ResizeObserver handles internal canvas resolution and Module window size.
// It fires once immediately on observation, guaranteeing the initial size
// is synced with the final CSS layout before the Emscripten module loads.
const resizeObserver = new ResizeObserver((entries) => {
    for (const entry of entries) {
        const dpr = window.devicePixelRatio || 1;
        const cssWidth = entry.contentRect.width;
        const cssHeight = entry.contentRect.height;
        const w = Math.max(1, Math.round(cssWidth * dpr));
        const h = Math.max(1, Math.round(cssHeight * dpr));

        const mcanvas = document.querySelector('#mcanvas');
        const scanvas = document.querySelector('#scanvas');
        if (!mcanvas || !scanvas) continue;

        mcanvas.width = w;
        mcanvas.height = h;
        scanvas.width = w;
        scanvas.height = h;

        mcanvas.style.width = cssWidth + 'px';
        mcanvas.style.height = cssHeight + 'px';
        scanvas.style.width = cssWidth + 'px';
        scanvas.style.height = cssHeight + 'px';

        if (typeof Module !== 'undefined' && Module.setWindowSize) {
            Module.setWindowSize(w, h);
        }
        if (typeof Module !== 'undefined' && Module.setAspectCorrection) {
            Module.setAspectCorrection(isBezelMode);
        }
    }
});

const contain1El = document.querySelector('#contain1');
if (contain1El) {
    resizeObserver.observe(contain1El);
}

// ====== API PRESET HELPERS ======
async function fetchApiPreset(apiBase) {
    const res = await fetch(`${apiBase}/api/presets/random?dir=any`);
    if (!res.ok) throw new Error('API error: ' + res.status);
    const data = await res.json();
    if (!data.url || !data.filename || !data.dir) {
        throw new Error('Invalid API response: missing url, filename, or dir');
    }
    const milkRes = await fetch(data.url);
    if (!milkRes.ok) throw new Error('Failed to fetch milk: ' + milkRes.status);
    const buffer = await milkRes.arrayBuffer();
    const bytes = new Uint8ClampedArray(buffer);
    const safeName = data.filename.replace(/[^a-zA-Z0-9._-]/g, '_');
    const vfsPath = `/presets/api_${data.dir}_${safeName}`;
    if (!Module.FS) throw new Error('Module.FS not available');
    Module.FS.writeFile(vfsPath, bytes);
    return { vfsPath, filename: data.filename, dir: data.dir };
}

async function loadStartupApiPresets(count) {
    const apiBase = localStorage.getItem('apiBase') || 'https://storage.noahcohn.com';
    const paths = [];
    for (let i = 0; i < count; i++) {
        try {
            const result = await fetchApiPreset(apiBase);
            paths.push(result.vfsPath);
            console.log('Startup API preset', i, 'loaded:', result.filename);
        } catch (e) {
            console.error('Failed to load startup API preset', i, e);
        }
    }
    return paths;
}

// ====== UI CONTROLS ======
document.getElementById("randomPresetBtn").addEventListener('click', function() {
    if (typeof Module !== 'undefined' && Module.switchPreset) {
        Module.switchPreset();
    }
});

document.getElementById("apiRandomPresetBtn").addEventListener('click', async function() {
    if (typeof Module === 'undefined' || !Module.loadPresetFile) {
        console.error('Module not ready');
        return;
    }
    const apiBase = localStorage.getItem('apiBase') || 'https://storage.noahcohn.com';
    try {
        const result = await fetchApiPreset(apiBase);
        Module.loadPresetFile(result.vfsPath);
        console.log('Loaded API preset:', result.filename, 'from', result.dir);
    } catch (e) {
        console.error('Failed to load API preset, falling back to local preset:', e);
        if (typeof Module !== 'undefined' && Module.switchPreset) {
            Module.switchPreset();
        }
    }
});

document.getElementById("toggleBezelBtn").addEventListener('click', function() {
    isBezelMode = !isBezelMode;
    updateLayout();
});

// ====== WINDOW RESIZE HANDLER ======
// ResizeObserver subsumes viewport resize for the canvases themselves,
// but in bezel mode contain1 has a fixed pixel size derived from
// window.innerHeight, so we still need to recompute layout on resize.
window.addEventListener('resize', updateLayout);

// ====== MODULE INITIALIZATION ======
// Initialize layout immediately. ResizeObserver will fire once
// with the correct CSS-computed size and set internal resolution.
updateLayout();

// Hide splash screens after a delay
setTimeout(function(){
    document.querySelector('#splash2').style.display = 'none';
}, 5200);
setTimeout(function(){
    document.querySelector('#splash1').style.display = 'none';
}, 5500);

// Load Module
setTimeout(function(){
    let scr = document.createElement("script");
    scr.async = true;
    scr.charset = 'utf-8';
    scr.type = 'text/javascript';
    scr.defer = true;
    scr.src = "./pm/projectm-v.024-thread.1ijs";
    document.body.appendChild(scr);

    setTimeout(function(){
        createModule().then(async function(instance) {
            Module = instance;

            Module.init();
            updateLayout();
            const mcanvas = document.querySelector('#mcanvas');

            const startupPaths = await loadStartupApiPresets(5);
            if (startupPaths.length > 0) {
                Module.loadPresetFile(startupPaths[0]);
                for (let i = 1; i < startupPaths.length; i++) {
                    Module.addPresetFile(startupPaths[i]);
                }
            } else {
                console.warn('No startup API presets loaded, falling back to switchPreset');
                Module.switchPreset();
            }

            Module.startRender(mcanvas.width, mcanvas.height);
        });
    }, 1000);
}, 750);

// Start with default audio
setTimeout(function(){
    document.getElementById('musicBtn').click();
}, 3000);

</script>
</body>
</html>
